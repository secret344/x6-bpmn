<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>x6-plugin-bpmn 浏览器测试</title>
    <style>
      html,
      body,
      #app,
      #graph {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #f7f8fa;
      }

      #app {
        position: relative;
      }

      .toolbar {
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 10;
        display: flex;
        gap: 8px;
        padding: 8px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(10px);
      }

      .toolbar button {
        border: 1px solid #d0d7e2;
        border-radius: 10px;
        background: #fff;
        color: #334155;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      .toolbar button.is-active {
        border-color: #2563eb;
        background: #eff6ff;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="toolbar" data-testid="edge-toolbar">
        <button type="button" data-testid="edge-shape-sequence" data-edge-shape="bpmn-sequence-flow">顺序流</button>
        <button type="button" data-testid="edge-shape-message" data-edge-shape="bpmn-message-flow">消息流</button>
      </div>
      <div id="graph" data-testid="plugin-graph-container"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
  </html>
